# Continuous vulnerability scanning for the workspace.
#
# Two complementary scanners:
#
#   govulncheck — Go-aware. Cross-references the Go vulnerability
#                 database (https://pkg.go.dev/vuln) against actually-
#                 imported call sites, not just dep manifests. This is
#                 strictly stronger than manifest-only scanning for Go
#                 code: a vulnerable function in a dep that the kit
#                 never calls is correctly down-graded to "informational"
#                 and does NOT fail the build.
#
#   osv-scanner — Manifest-aware, multi-ecosystem. We use it to catch
#                 npm transitive vulns (the kit ships a small node
#                 toolchain for NX) and YAML/Dockerfile pinning
#                 issues that govulncheck doesn't see.
#
# Failure threshold:
#
#   Both jobs fail on findings whose severity is >= the value of the
#   `VULN_FAIL_LEVEL` repository variable (default: HIGH). To adjust
#   for the entire repo set `VULN_FAIL_LEVEL` under
#   Settings -> Secrets and variables -> Actions -> Variables. Allowed
#   values: LOW, MEDIUM, HIGH, CRITICAL. Setting it to CRITICAL makes
#   the workflow informational only — DO NOT do this without filing
#   a tracked exception in docs/audit/.

name: Vuln Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 00:00 UTC. Catches CVEs published since the last
    # CI run. The schedule run scans ALL modules regardless of
    # affected status, so vulns in dormant code paths still surface.
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # Needed by osv-scanner-action to upload SARIF results to the
  # Security tab. Code-scanning ingestion is required for the
  # findings-history view; without it we only get workflow logs.
  security-events: write

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMCHECK: github.com/bds421/*
  # Default fail threshold. Override per-repo via the
  # VULN_FAIL_LEVEL variable; do NOT override per-PR.
  VULN_FAIL_LEVEL: ${{ vars.VULN_FAIL_LEVEL || 'HIGH' }}

jobs:
  # ----------------------------------------------------------------
  # govulncheck: Go-source-aware vuln scan.
  #
  # Strategy:
  #   - On schedule / push to main / workflow_dispatch: scan ALL Go
  #     modules in the workspace.
  #   - On pull_request: scan only the modules affected by the PR's
  #     diff (`npx nx affected --plain`). Cuts CI minutes while still
  #     catching newly-introduced vulnerabilities.
  # ----------------------------------------------------------------
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"

      - name: Set up Node (for nx affected)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install npm deps
        run: npm ci

      - name: Install govulncheck
        # Pin to a known-good version. Bump deliberately during
        # security-review windows; bump in this file rather than via
        # `@latest` so the version is part of the audit trail.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Set up nx-set-shas (for affected detection on PRs)
        if: github.event_name == 'pull_request'
        uses: nrwl/nx-set-shas@v5

      # Discover modules to scan.
      #
      # For PRs, we use NX's affected-projects list so a doc-only
      # change doesn't trigger a 50-module scan. For all other
      # triggers (push to main, weekly schedule, workflow_dispatch)
      # we scan every module — the schedule run is the canonical
      # full-coverage signal.
      - name: Discover Go modules to scan
        id: discover
        env:
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          modules_file="$(mktemp)"
          if [ "$EVENT" = "pull_request" ]; then
            # nx affected emits Go project names (matching the
            # directory) one per line in --plain mode.
            mapfile -t affected < <(npx nx show projects --affected --plain || true)
            if [ "${#affected[@]}" -eq 0 ]; then
              echo "No affected modules — nothing to scan." | tee -a "$GITHUB_STEP_SUMMARY"
              echo "modules_file=$modules_file" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            for project in "${affected[@]}"; do
              # Each project name maps to a directory under the repo
              # root containing a go.mod (NX project root === module dir).
              if [ -f "$project/go.mod" ]; then
                printf "%s\n" "$project" >> "$modules_file"
              fi
            done
          else
            while IFS= read -r modfile; do
              dirname "$modfile" >> "$modules_file"
            done < <(find . -name go.mod -not -path "./node_modules/*" -not -path "./dist/*" -not -path "./.git/*" | sed 's|^\./||')
          fi
          echo "Modules selected for govulncheck:"
          cat "$modules_file"
          echo "modules_file=$modules_file" >> "$GITHUB_OUTPUT"

      - name: Run govulncheck per module
        env:
          MODULES_FILE: ${{ steps.discover.outputs.modules_file }}
          FAIL_LEVEL: ${{ env.VULN_FAIL_LEVEL }}
        run: |
          set -uo pipefail
          if [ ! -s "$MODULES_FILE" ]; then
            echo "Empty module list — skipping." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          fail=0
          findings_dir="$(mktemp -d)"
          while IFS= read -r module_dir; do
            [ -z "$module_dir" ] && continue
            echo "::group::govulncheck (${module_dir})"
            json_out="${findings_dir}/$(echo "$module_dir" | tr '/' '_').json"
            # govulncheck always exits non-zero when it finds any
            # vulnerability (mode "called" or "imported").
            # We capture JSON output and then post-filter by severity
            # so the FAIL_LEVEL threshold can be tuned via repo var.
            if (cd "$module_dir" && govulncheck -json -mode source ./...) > "$json_out" 2> "${json_out}.err"; then
              echo "clean: $module_dir"
            else
              # govulncheck returns 3 when called vulns are found,
              # 0 otherwise. Anything else is a tooling failure.
              rc=$?
              if [ "$rc" -ne 3 ]; then
                echo "govulncheck tooling error (rc=$rc) in $module_dir" >&2
                cat "${json_out}.err" >&2
                fail=1
                echo "::endgroup::"
                continue
              fi
            fi
            # Extract called-vuln IDs and their severities. The
            # `osv` records inside the JSON stream carry CVSS info.
            python3 - "$json_out" "$FAIL_LEVEL" "$module_dir" <<'PY' || fail=1
          import json, sys
          path, fail_level, mod_dir = sys.argv[1], sys.argv[2], sys.argv[3]
          order = ["LOW", "MEDIUM", "HIGH", "CRITICAL"]
          threshold = order.index(fail_level.upper())
          osvs = {}
          findings = []
          with open(path) as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      rec = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  if "osv" in rec:
                      osv = rec["osv"]
                      osvs[osv["id"]] = osv
                  if "finding" in rec:
                      findings.append(rec["finding"])
          if not findings:
              sys.exit(0)
          # Only "called" findings (Trace present) are runtime-reachable.
          called = [f for f in findings if f.get("trace") and f.get("trace")[0].get("function")]
          if not called:
              sys.exit(0)
          fatal = 0
          for f in called:
              osv = osvs.get(f.get("osv", ""), {})
              # Pull the highest CVSS severity across affected ranges.
              sev = "MEDIUM"
              for affected in osv.get("affected", []):
                  for sv in affected.get("severity", []) or []:
                      score = sv.get("score", "")
                      # CVSS_V3 vector form starts with "CVSS:3"; we
                      # do a best-effort categorical mapping.
                      if "AV:N" in score and "I:H" in score:
                          sev = "HIGH"
                      if "C:H" in score and "I:H" in score and "A:H" in score:
                          sev = "CRITICAL"
              # Database-level severity field (newer entries):
              dbsev = osv.get("database_specific", {}).get("severity", "")
              if dbsev.upper() in order:
                  sev = dbsev.upper()
              level = order.index(sev) if sev in order else 1
              marker = "FAIL" if level >= threshold else "warn"
              print(f"  [{marker}] {osv.get('id','?')} ({sev}) in {mod_dir}: {osv.get('summary','')[:120]}")
              if level >= threshold:
                  fatal += 1
          if fatal:
              sys.exit(2)
          sys.exit(0)
          PY
            echo "::endgroup::"
          done < "$MODULES_FILE"
          if [ "$fail" -ne 0 ]; then
            echo "::error::govulncheck found at least one >= $FAIL_LEVEL finding"
            exit 1
          fi

  # ----------------------------------------------------------------
  # osv-scanner: manifest-aware multi-ecosystem scan.
  #
  # Catches:
  #   - npm transitive vulns (package-lock.json — NX toolchain)
  #   - GitHub Actions advisories
  #   - Vulns in pinned binaries referenced by go.mod replace dirs
  # ----------------------------------------------------------------
  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The official action wraps the scanner with SARIF upload to the
      # GitHub Security tab and standardises CLI flags. Pin to a tag
      # rather than `@main` for reproducibility — bump deliberately.
      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.2
        with:
          # Scan the whole repo. The action skips vendored deps
          # under /node_modules by default; we explicitly include
          # package-lock.json so npm transitive deps are checked.
          scan-args: |-
            --recursive
            --skip-git
            --lockfile=package-lock.json
            --format=sarif
            --output=osv-results.sarif
            ./
        # The action exits non-zero on any finding regardless of
        # severity. We do post-filtering below before failing CI.
        continue-on-error: true

      - name: Filter findings by severity threshold
        env:
          FAIL_LEVEL: ${{ env.VULN_FAIL_LEVEL }}
        run: |
          set -euo pipefail
          if [ ! -f osv-results.sarif ]; then
            echo "no SARIF output — scanner failed"
            exit 1
          fi
          python3 - "$FAIL_LEVEL" <<'PY'
          import json, sys
          fail_level = sys.argv[1].upper()
          order = ["LOW", "MEDIUM", "HIGH", "CRITICAL"]
          threshold = order.index(fail_level)
          with open("osv-results.sarif") as f:
              sarif = json.load(f)
          fatal = 0
          for run in sarif.get("runs", []):
              rules = {r["id"]: r for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
              for result in run.get("results", []):
                  rid = result.get("ruleId", "?")
                  rule = rules.get(rid, {})
                  # GitHub SARIF severity is in properties.security-severity (CVSS 0.0-10.0).
                  cvss = rule.get("properties", {}).get("security-severity", "")
                  try:
                      score = float(cvss)
                  except (TypeError, ValueError):
                      score = 0.0
                  if score >= 9.0:
                      sev = "CRITICAL"
                  elif score >= 7.0:
                      sev = "HIGH"
                  elif score >= 4.0:
                      sev = "MEDIUM"
                  else:
                      sev = "LOW"
                  marker = "FAIL" if order.index(sev) >= threshold else "warn"
                  msg = result.get("message", {}).get("text", "")[:160]
                  print(f"  [{marker}] {rid} ({sev}, cvss={score}): {msg}")
                  if order.index(sev) >= threshold:
                      fatal += 1
          if fatal:
              print(f"::error::osv-scanner found {fatal} finding(s) >= {fail_level}")
              sys.exit(1)
          PY

      - name: Upload SARIF to code scanning
        # Even when no findings exceed threshold, upload the SARIF so
        # the Security tab tracks history.
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
