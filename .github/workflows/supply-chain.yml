name: Dependency Security

# Dependency scans run when dependency inputs change. The weekly schedule is
# retained only for govulncheck because the vulnerability database can change
# while this repository is idle; licenses cannot drift without a repository
# change and therefore are not rechecked on the timer.
on:
  pull_request:
    branches: [main]
    paths:
      - "**/go.mod"
      - "go.work"
      - "tools/check-licenses.sh"
      - ".github/workflows/supply-chain.yml"
  push:
    branches: [main]
    paths:
      - "**/go.mod"
      - "go.work"
      - "tools/check-licenses.sh"
      - ".github/workflows/supply-chain.yml"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMDB: github.com/bds421/*

jobs:
  dependencies:
    name: Vulnerabilities and licenses
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache-dependency-path: "**/go.sum"

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Check reachable vulnerabilities
        run: make vulncheck

      - name: Check dependency licenses
        if: github.event_name != 'schedule'
        run: make check-licenses
