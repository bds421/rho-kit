name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMCHECK: github.com/bds421/*

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      # Install once, reuse across all modules (faster than go run per module)
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

      # Cache golangci-lint analysis results between runs
      - uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ hashFiles('**/*.go') }}
          restore-keys: golangci-lint-

      - name: Lint
        run: |
          WORKSPACE_MODULES=$(sed -n '/^use (/,/^)/{ s/^[[:space:]]*\.\/\(.*\)/\1/p; }' go.work | grep -v '^\.')
          for dir in $WORKSPACE_MODULES; do
            echo "==> Linting $dir"
            (cd "$dir" && golangci-lint run --timeout=5m ./...) || exit 1
          done

      - name: Test
        run: |
          WORKSPACE_MODULES=$(sed -n '/^use (/,/^)/{ s/^[[:space:]]*\.\/\(.*\)/\1/p; }' go.work | grep -v '^\.')
          for dir in $WORKSPACE_MODULES; do
            echo "==> Testing $dir"
            (cd "$dir" && go test -race ./...) || exit 1
          done

      - name: Build
        run: |
          WORKSPACE_MODULES=$(sed -n '/^use (/,/^)/{ s/^[[:space:]]*\.\/\(.*\)/\1/p; }' go.work | grep -v '^\.')
          for dir in $WORKSPACE_MODULES; do
            echo "==> Building $dir"
            (cd "$dir" && go build ./...) || exit 1
          done
