name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'CHANGELOG.md'
      - 'NOTICE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'CHANGELOG.md'
      - 'NOTICE'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMDB: github.com/bds421/*

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: "**/go.sum"

      # Cache the Go build cache ($GOCACHE) across runs. setup-go@v6 already
      # handles $GOPATH/pkg/mod (module download cache, keyed on go.sum).
      # The build cache holds compiled object files; reusing them across
      # commits where the bulk of code is unchanged cuts test/build time
      # significantly (~24m → ~6m on incremental commits).
      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-gobuild-${{ hashFiles('**/go.sum') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gobuild-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-gobuild-

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Run CI
        run: make ci
