name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMCHECK: github.com/bds421/*

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nrwl/nx-set-shas@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: npm ci

      # Install golangci-lint for NX lint target
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

      - uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ hashFiles('**/*.go') }}
          restore-keys: golangci-lint-

      - name: Lint, Test & Build (affected)
        run: npx nx affected -t lint test build
