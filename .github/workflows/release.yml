name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**'
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMDB: github.com/bds421/*

jobs:
  readiness:
    name: Validate v2 readiness
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'release-candidate')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: "**/go.sum"

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Verify working tree
        run: |
          set -euo pipefail
          git status --short
          test -z "$(git status --short)"
          git diff --check

      - name: Check v2 workspace dependency invariants
        run: EXPECTED_INTERNAL_VERSION=v2.0.0 make check-publishable

      - name: Compute dependency-ordered release plan
        run: RELEASE_MODE=all make release-plan

      - name: Rehearse dependency-ordered release locally
        run: tools/rehearse-v2-release.sh

      - name: Run release-candidate gates
        run: make release-candidate

      - name: Verify no v2 tags exist yet
        run: |
          set -euo pipefail
          test -z "$(git tag --list '*v2.0.0')"
          test -z "$(git ls-remote --tags origin '*v2.0.0')"

      - name: Summarize next manual steps
        run: |
          {
            echo "Release readiness passed."
            echo
            echo "This workflow does not create tags or GitHub releases."
            echo "When the release owner is ready, follow docs/release/FINAL_RELEASE_RUNBOOK_V2.md."
          } >> "$GITHUB_STEP_SUMMARY"
