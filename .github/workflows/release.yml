name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMCHECK: github.com/bds421/*
  GONOSUMDB: github.com/bds421/*

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Configure git for private modules
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      # Step 1: NX versions go.mod + changelogs, commits, tags (locally)
      - name: Version, changelog, and tag
        run: npx nx release --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      # Step 2: Push tags first so modules are resolvable from git
      - name: Push tags
        run: git push --tags

      # Step 3: Now that tags exist, regenerate go.sum with GOWORK=off
      # so checksums for internal modules are correct
      - name: Regenerate go.sum files
        run: |
          set -e
          for dir in $(grep '^\s*\./' go.work | sed 's/^[[:space:]]*//'); do
            echo "go mod tidy: $dir"
            (cd "$dir" && GOWORK=off go mod tidy)
          done

      # Step 4: Amend the release commit with updated go.sum files
      - name: Amend release commit with go.sum updates
        run: |
          git add '**/go.sum' '*/go.sum' go.work.sum
          # Only amend if there are staged changes
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
            # Move tags to the amended commit
            for tag in $(git tag --points-at HEAD~1 2>/dev/null); do
              git tag -f "$tag"
            done
          fi

      # Step 5: Force-push the amended commit and updated tags
      - name: Push release commit and updated tags
        run: |
          git push --force-with-lease
          git push --tags --force
