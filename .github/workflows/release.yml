name: Release Rehearsal

# The exhaustive release candidate runs locally before this workflow. This
# manual workflow performs only release-specific checks and never publishes.
on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Version to rehearse (for example v2.6.0); defaults to the next minor"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/bds421/*
  GONOSUMDB: github.com/bds421/*

jobs:
  rehearsal:
    name: Rehearse module release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache-dependency-path: "**/go.sum"

      - name: Configure git for private modules
        env:
          TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Determine release versions
        id: versions
        env:
          INPUT_TARGET: ${{ inputs.target_version }}
        run: |
          set -euo pipefail
          current="$(git tag -l 'release/v*' | sed 's#release/##' | sort -V | tail -1)"
          if [ -z "$current" ]; then current="v2.0.0"; fi
          target="$INPUT_TARGET"
          if [ -n "$target" ]; then
            if ! printf '%s' "$target" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "target_version must be vMAJOR.MINOR.PATCH (got: $target)" >&2
              exit 1
            fi
          else
            ver="${current#v}"
            IFS=. read -r major minor _patch <<< "$ver"
            target="v${major}.$((minor + 1)).0"
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Check publishable module invariants
        env:
          EXPECTED_INTERNAL_VERSION: ${{ steps.versions.outputs.current }}
        run: make check-publishable

      - name: Rehearse dependency-ordered release
        env:
          RELEASE_VERSION: ${{ steps.versions.outputs.target }}
        run: bash tools/rehearse-v2-release.sh

      - name: Verify target version is unused
        env:
          TARGET: ${{ steps.versions.outputs.target }}
        run: |
          set -euo pipefail
          test -z "$(git tag --list "*${TARGET}")"
          test -z "$(git ls-remote --tags origin "*${TARGET}")"
