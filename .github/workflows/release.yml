name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GOTOOLCHAIN: local
  GOPRIVATE: github.com/bds421/*
  GONOSUMCHECK: github.com/bds421/*
  GONOSUMDB: github.com/bds421/*

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Configure git for private modules
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      # NX determines versions, updates go.mod deps, generates changelogs.
      # Git operations are disabled — we handle commit/tag/push per level.
      - name: Compute versions and update files
        run: npx nx release --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GOWORK: ${{ github.workspace }}/go.work

      # Release in dependency order: leaf modules first, then dependents.
      # Each level gets go mod tidy (deps already tagged), commit, tag, push.
      - name: Hierarchical release
        run: bash tools/nx-release/hierarchical-release.sh
