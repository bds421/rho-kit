# Generate a CycloneDX Software Bill of Materials for the workspace.
#
# Why CycloneDX (not SPDX)?
#   - The Anchore syft scanner (used by anchore/sbom-action) emits richer
#     Go-module metadata in CycloneDX 1.5: every transitive dep gets a
#     `purl` of the form `pkg:golang/...@vX.Y.Z`, with the module's
#     `h1:` checksum carried as a hash component. SPDX's pkg:golang
#     support is still catching up.
#   - CycloneDX is OWASP's reference format (https://cyclonedx.org) and
#     is the format the Go security team's `govulncheck` toolchain
#     ingests for offline vuln matching.
#   - CycloneDX 1.5 has first-class support for VEX (vulnerability
#     exploitability exchange) statements, which a post-v2 follow-up can
#     attach once VEX publication and artifact attestations are in place.
# We may dual-emit SPDX in the future; CycloneDX is the canonical
# artifact for now.

name: SBOM

on:
  push:
    # Any module-tagged release. The release runbook tags modules as
    # `<module>/v<version>`; we match the trailing `vN.N.N` segment.
    tags:
      - "**/v[0-9]+.[0-9]+.[0-9]+"
      - "**/v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      upload_release_artifact:
        description: "Attach SBOM to the GitHub release matching the tag (only valid for tag runs)."
        required: false
        default: "false"

permissions:
  contents: write # required to attach SBOM as a release artifact

env:
  # Pin syft via the action's `syft-version` input rather than
  # relying on the action's bundled default. Bump this in lockstep
  # with security review.
  SYFT_VERSION: v1.18.1

jobs:
  generate:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: "**/go.sum"

      # Download all module deps so syft sees the full transitive
      # closure, not just the modules with cached zip files. We use
      # `go mod download` per module rather than `go work sync` to
      # avoid mutating go.work / go.work.sum on the runner.
      - name: Download module sources
        run: |
          set -euo pipefail
          while IFS= read -r modfile; do
            module_dir="$(dirname "$modfile")"
            echo "::group::go mod download (${module_dir})"
            (cd "$module_dir" && go mod download all)
            echo "::endgroup::"
          done < <(find . -name go.mod -not -path "./dist/*" -not -path "./.git/*")

      - name: Generate SBOM (CycloneDX JSON)
        id: sbom
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: rho-kit.cdx.json
          # Disable the action's GitHub-release auto-upload — we want
          # explicit control below so workflow_dispatch runs don't
          # accidentally publish.
          upload-release-assets: false
          upload-artifact: true
          upload-artifact-retention: 90
          syft-version: ${{ env.SYFT_VERSION }}

      - name: Show SBOM summary
        run: |
          set -euo pipefail
          echo "SBOM size: $(wc -c < rho-kit.cdx.json) bytes"
          # Top-level component count — quick sanity check.
          jq '.components | length' rho-kit.cdx.json

      # Attach to release ONLY when triggered by a tag push. We do not
      # rely on the action's `upload-release-assets` because that
      # implicitly uploads on every tag run; we want the choice
      # explicit and gated on event type.
      - name: Attach SBOM to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # The release for the tag must already exist. We attach the SBOM as a
          # named asset; `--clobber` lets us re-run the workflow
          # idempotently if it had to be retried.
          gh release upload "$TAG" rho-kit.cdx.json --clobber
