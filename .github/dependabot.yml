# Dependabot configuration for rho-kit.
#
# Two ecosystems:
#
#   gomod: SINGLE entry at directory: "/" relying on Dependabot's
#     Go workspace (go.work) auto-discovery. The earlier config with
#     a 101-entry `directories:` list timed out on every discovery
#     run ("took too long to complete") because Dependabot's
#     discovery scan walks each directory listed and the combined
#     work exceeded the per-job timeout (~45-60 min). Discovery is
#     the bottleneck; once it succeeds, per-dep PR jobs spawn
#     independently and finish quickly. With a single workspace
#     entry, discovery happens once and the rest just works.
#
#   github-actions: monthly check of all workflow action versions.
#
# Security updates (auto-PR for CVEs in any tracked dep) are enabled
# separately at the repo level via /automated-security-fixes. Those
# are narrow per-CVE jobs that are not affected by the version-
# update discovery timeout.

version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "Etc/UTC"
    groups:
      go-deps-minor-patch:
        patterns: ["*"]
        update-types: ["patch", "minor"]
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "04:00"
      timezone: "Etc/UTC"
    groups:
      gh-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"
      include: scope
