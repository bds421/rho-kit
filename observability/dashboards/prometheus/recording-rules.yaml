# Recording rules pre-aggregate p50/p95/p99 from the histogram so
# ad-hoc queries hit a cheap recorded series instead of computing
# `histogram_quantile` over millions of buckets at query time.
#
# Convention: recording rule name = source metric + `:p{50,95,99}5m`,
# matching the standard from Brian Brazil's "Prometheus: Up & Running".
groups:
  - name: rho-kit-http-latency
    interval: 30s
    rules:
      - record: http_request_duration_seconds:p50:5m
        expr: |
          histogram_quantile(0.50,
            sum by (namespace, service, route, le)
              (rate(http_request_duration_seconds_bucket[5m]))
          )
      - record: http_request_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, route, le)
              (rate(http_request_duration_seconds_bucket[5m]))
          )
      - record: http_request_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, route, le)
              (rate(http_request_duration_seconds_bucket[5m]))
          )

  - name: rho-kit-http-rates
    interval: 30s
    rules:
      - record: http_requests:rate:5m
        expr: |
          sum by (namespace, service, route)
            (rate(http_requests_total[5m]))
      - record: http_errors:rate:5m
        expr: |
          sum by (namespace, service, route, status_class)
            (rate(http_errors_total[5m]))
      - record: http_error_ratio:5m
        expr: |
          sum by (namespace, service, route)
            (rate(http_errors_total[5m]))
          /
          sum by (namespace, service, route)
            (rate(http_requests_total[5m]))

  - name: rho-kit-grpc-latency
    interval: 30s
    rules:
      - record: grpc_server_handling_seconds:p50:5m
        expr: |
          histogram_quantile(0.50,
            sum by (namespace, service, grpc_method, le)
              (rate(grpc_server_handling_seconds_bucket[5m]))
          )
      - record: grpc_server_handling_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, grpc_method, le)
              (rate(grpc_server_handling_seconds_bucket[5m]))
          )
      - record: grpc_server_handling_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, grpc_method, le)
              (rate(grpc_server_handling_seconds_bucket[5m]))
          )

  - name: rho-kit-grpc-rates
    interval: 30s
    rules:
      - record: grpc_server_handled:rate:5m
        expr: |
          sum by (namespace, service, grpc_method, grpc_code)
            (rate(grpc_server_handled_total[5m]))
      - record: grpc_server_error_ratio:5m
        expr: |
          sum by (namespace, service, grpc_method)
            (rate(grpc_server_handled_total{grpc_code!="OK"}[5m]))
          /
          sum by (namespace, service, grpc_method)
            (rate(grpc_server_handled_total[5m]))

  - name: rho-kit-redis-latency
    interval: 30s
    rules:
      - record: redis_command_duration_seconds:p50:5m
        expr: |
          histogram_quantile(0.50,
            sum by (namespace, service, instance, le)
              (rate(redis_command_duration_seconds_bucket[5m]))
          )
      - record: redis_command_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, instance, le)
              (rate(redis_command_duration_seconds_bucket[5m]))
          )
      - record: redis_command_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, instance, le)
              (rate(redis_command_duration_seconds_bucket[5m]))
          )

  - name: rho-kit-storage-latency
    interval: 30s
    rules:
      - record: storage_s3_operation_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_s3_operation_duration_seconds_bucket[5m]))
          )
      - record: storage_s3_operation_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_s3_operation_duration_seconds_bucket[5m]))
          )
      - record: storage_gcs_operation_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_gcs_operation_duration_seconds_bucket[5m]))
          )
      - record: storage_gcs_operation_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_gcs_operation_duration_seconds_bucket[5m]))
          )
      - record: storage_azure_operation_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_azure_operation_duration_seconds_bucket[5m]))
          )
      - record: storage_azure_operation_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_azure_operation_duration_seconds_bucket[5m]))
          )
      - record: storage_sftp_operation_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_sftp_operation_duration_seconds_bucket[5m]))
          )
      - record: storage_sftp_operation_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, instance, operation, le)
              (rate(storage_sftp_operation_duration_seconds_bucket[5m]))
          )

  - name: rho-kit-outbox-latency
    interval: 30s
    rules:
      - record: outbox_relay_latency_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, le)
              (rate(outbox_relay_latency_seconds_bucket[5m]))
          )
      - record: outbox_relay_latency_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, le)
              (rate(outbox_relay_latency_seconds_bucket[5m]))
          )
      - record: outbox_error_ratio:5m
        expr: |
          rate(outbox_errors_total[5m])
          /
          clamp_min(
            rate(outbox_published_total[5m])
              + rate(outbox_errors_total[5m]),
            0.0001
          )

  - name: rho-kit-amqp-latency
    interval: 30s
    rules:
      - record: amqp_publish_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, exchange, routing_key, le)
              (rate(amqp_publish_duration_seconds_bucket[5m]))
          )
      - record: amqp_publish_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, exchange, routing_key, le)
              (rate(amqp_publish_duration_seconds_bucket[5m]))
          )
      - record: amqp_handler_duration_seconds:p95:5m
        expr: |
          histogram_quantile(0.95,
            sum by (namespace, service, queue, le)
              (rate(amqp_handler_duration_seconds_bucket[5m]))
          )
      - record: amqp_handler_duration_seconds:p99:5m
        expr: |
          histogram_quantile(0.99,
            sum by (namespace, service, queue, le)
              (rate(amqp_handler_duration_seconds_bucket[5m]))
          )
      - record: amqp_publish_error_ratio:5m
        expr: |
          sum by (namespace, service, exchange, routing_key)
            (rate(amqp_published_total{outcome!="success"}[5m]))
          /
          clamp_min(
            sum by (namespace, service, exchange, routing_key)
              (rate(amqp_published_total[5m])),
            0.0001
          )

  - name: rho-kit-ratelimit-rates
    interval: 30s
    rules:
      - record: http_ratelimit_limited_ratio:5m
        expr: |
          sum by (namespace, service, limiter, kind)
            (rate(http_ratelimit_decisions_total{outcome="limited"}[5m]))
          /
          clamp_min(
            sum by (namespace, service, limiter, kind)
              (rate(http_ratelimit_decisions_total{outcome=~"allowed|limited"}[5m])),
            0.0001
          )
      - record: http_ratelimit_unavailable:rate:5m
        expr: |
          sum by (namespace, service, limiter, kind, outcome)
            (rate(http_ratelimit_decisions_total{outcome=~"unavailable|degraded_rejected|degraded_passthrough"}[5m]))
