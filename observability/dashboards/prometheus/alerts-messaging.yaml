# Messaging alerts for outbox relay and direct messaging backends.
groups:
  - name: rho-kit-messaging
    rules:
      - alert: RhoKitOutboxErrorRateHigh
        # If publish errors exceed 5% of (published + errors) for a
        # sustained window, the broker is unhealthy or there's a
        # serialization bug. Distinct from backlog growth — errors can
        # spike with a stable backlog if the relay is failing fast.
        expr: |
          rate(outbox_errors_total[5m])
          /
          clamp_min(
            rate(outbox_published_total[5m])
              + rate(outbox_errors_total[5m]),
            0.0001
          )
            > 0.05
        for: 15m
        labels:
          severity: warn
          source: rho-kit
        annotations:
          summary: "Outbox publish errors > 5% for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            More than 5% of outbox publish attempts are failing over 15
            minutes. Common causes: broker outage, broker auth/topology
            change, or a payload that the broker rejects. Check the
            outbox dashboard's error ratio panel and broker connectivity.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/outbox-errors.md"

      - alert: RhoKitOutboxNoProgress
        # The relay should publish *something* during business hours.
        # If published_total is flat but pending is non-zero, the relay
        # is stuck — page early, before backlog grows.
        expr: |
          rate(outbox_published_total[10m]) == 0
          and
          outbox_pending_count > 0
        for: 10m
        labels:
          severity: page
          source: rho-kit
        annotations:
          summary: "Outbox relay stuck for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            outbox_pending_count > 0 but no entries have been published in
            the last 10 minutes. The relay loop is wedged. Check logs for
            broker connection errors or a panic in the publish callback.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/outbox-errors.md"

      - alert: RhoKitOutboxRelayLatencyHigh
        # If p99 of a single publish exceeds 5s, individual broker
        # round-trips are slow — likely network or broker side issues.
        expr: |
          outbox_relay_latency_seconds:p99:5m > 5
        for: 15m
        labels:
          severity: warn
          source: rho-kit
        annotations:
          summary: "Outbox relay p99 > 5s for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            p99 of outbox_relay_latency_seconds has been > 5s for 15
            minutes. The broker is slow or the network has degraded.
            Backlog growth is probably imminent.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/outbox-errors.md"

      - alert: RhoKitAMQPPublishFailuresHigh
        # Includes broker/channel failures, unroutable mandatory publishes,
        # invalid messages, and message-size rejections.
        expr: |
          sum by (namespace, service, exchange, routing_key)
            (rate(amqp_published_total{outcome!="success"}[5m]))
          /
          clamp_min(
            sum by (namespace, service, exchange, routing_key)
              (rate(amqp_published_total[5m])),
            0.0001
          )
            > 0.05
        for: 15m
        labels:
          severity: warn
          source: rho-kit
        annotations:
          summary: "AMQP publish failures > 5% for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            Direct AMQP publish attempts are failing for exchange
            {{ $labels.exchange }} / routing key {{ $labels.routing_key }}.
            Check broker connectivity, topology bindings, mandatory-return
            errors, and message-size route overrides.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/amqp-messaging.md"

      - alert: RhoKitAMQPDLQPublishFailures
        expr: |
          sum by (namespace, service, queue)
            (rate(amqp_consumed_total{outcome="dlq_publish_failed"}[5m]))
            > 0
        for: 5m
        labels:
          severity: page
          source: rho-kit
        annotations:
          summary: "AMQP dead-letter publish failures for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            A consumer tried to move exhausted messages from
            {{ $labels.queue }} to its dead exchange, but the publish failed.
            Messages are being nacked into the retry path and may loop until
            the dead-letter topology is fixed.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/amqp-messaging.md"

      - alert: RhoKitAMQPForceDiscard
        expr: |
          sum by (namespace, service, queue)
            (rate(amqp_consumed_total{outcome="force_discarded"}[5m]))
            > 0
        for: 5m
        labels:
          severity: page
          source: rho-kit
        annotations:
          summary: "AMQP force discards for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            The consumer force-discarded messages from {{ $labels.queue }}
            after exceeding retry or dead-letter failure safety limits.
            Inspect the DLQ, consumer logs, and dead-letter exchange bindings.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/amqp-messaging.md"

      - alert: RhoKitNATSPublishFailuresHigh
        # Includes broker failures, invalid messages, and message-size
        # rejections. Route validation failures happen before metric recording
        # because they are caller/configuration errors, not broker attempts.
        expr: |
          sum by (namespace, service, exchange, routing_key)
            (rate(nats_published_total{outcome!="success"}[5m]))
          /
          clamp_min(
            sum by (namespace, service, exchange, routing_key)
              (rate(nats_published_total[5m])),
            0.0001
          )
            > 0.05
        for: 15m
        labels:
          severity: warn
          source: rho-kit
        annotations:
          summary: "NATS publish failures > 5% for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            Direct NATS JetStream publish attempts are failing for exchange
            {{ $labels.exchange }} / routing key {{ $labels.routing_key }}.
            Check broker connectivity, stream subjects, auth, and route
            message-size overrides.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/nats-messaging.md"

      - alert: RhoKitNATSDeliveryFinalizationFailures
        expr: |
          sum by (namespace, service, stream, durable, outcome)
            (rate(nats_consumed_total{outcome=~"ack_failed|nak_failed|term_failed"}[5m]))
            > 0
        for: 5m
        labels:
          severity: page
          source: rho-kit
        annotations:
          summary: "NATS delivery finalization failures for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            The NATS consumer could not Ack, Nak, or Term deliveries for
            stream {{ $labels.stream }} / durable {{ $labels.durable }}.
            Duplicate delivery or stuck poison-message handling is likely.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/nats-messaging.md"

      - alert: RhoKitNATSHandlerPanics
        expr: |
          sum by (namespace, service, stream, durable)
            (rate(nats_consumed_total{outcome="handler_panic"}[5m]))
            > 0
        for: 5m
        labels:
          severity: page
          source: rho-kit
        annotations:
          summary: "NATS handler panics for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            A NATS handler panicked for stream {{ $labels.stream }} /
            durable {{ $labels.durable }}. The backend terminates those
            messages to avoid burning MaxDeliver, so inspect the payload and
            handler crash before replaying.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/nats-messaging.md"

      - alert: RhoKitRedisStreamFailureRateHigh
        expr: |
          sum by (namespace, service, stream, group)
            (rate(redis_stream_messages_failed_total[5m]))
          /
          clamp_min(
            sum by (namespace, service, stream, group)
              (rate(redis_stream_messages_consumed_total[5m]))
            +
            sum by (namespace, service, stream, group)
              (rate(redis_stream_messages_failed_total[5m])),
            0.0001
          )
            > 0.05
        for: 15m
        labels:
          severity: warn
          source: rho-kit
        annotations:
          summary: "Redis Stream handler failures > 5% for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            Redis Stream handler failures exceed 5% for stream
            {{ $labels.stream }} / group {{ $labels.group }}. Inspect
            handler logs, retry/dead-letter movement, and upstream Redis
            availability.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/redis-stream.md"

      - alert: RhoKitRedisStreamDeadLetters
        expr: |
          sum by (namespace, service, stream, group)
            (rate(redis_stream_messages_dead_lettered_total[5m]))
            > 0
        for: 5m
        labels:
          severity: page
          source: rho-kit
        annotations:
          summary: "Redis Stream dead-letter traffic for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            Messages are being moved to the Redis Stream dead-letter path for
            stream {{ $labels.stream }} / group {{ $labels.group }}. Inspect
            the dead-letter stream and consumer logs before acknowledging
            incident recovery.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/redis-stream.md"

      - alert: RhoKitRedisStreamPendingHigh
        expr: |
          redis_stream_pending_messages > 1000
        for: 15m
        labels:
          severity: warn
          source: rho-kit
        annotations:
          summary: "Redis Stream pending entries high for {{ $labels.namespace }}/{{ $labels.service }}"
          description: |
            Redis Stream pending entries have stayed above 1000 for stream
            {{ $labels.stream }} / group {{ $labels.group }}. Consumers may
            be slow, wedged, or repeatedly failing before ACK.
          runbook_url: "https://github.com/bds421/rho-kit/blob/main/docs/ai/runbooks/redis-stream.md"
